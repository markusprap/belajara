name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ master ]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://markusprap:${HF_TOKEN}@huggingface.co/spaces/markusprap/belajara
          git push --force hf master:main
