version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: belajara_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-belajara_db}
      POSTGRES_USER: ${POSTGRES_USER:-belajara_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-belajara_pass}
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: belajara_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
